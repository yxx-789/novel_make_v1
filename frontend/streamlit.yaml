version: 1.0

build:
  os: ubuntu-22.04
  architecture: x86_64
  python: "3.11"

runtime:
  shim: streamlit
  entrypoint: app.py

dependencies:
  - packages.txt
  - requirements.txt

# 环境变量示例（可以在Streamlit Cloud控制台设置）
environment:
  API_BASE_URL: "http://localhost:8000"
  OPENAI_API_KEY: "sk-..."
  LLM_MODEL: "gpt-4o-mini"
  
resources:
  cpu: 2
  memory: 8GB
  disk: 10GB

# 自定义域名（可选）
# custom_domain:
#   - your-domain.com

# 插件（可选）
plugins:
  - name: streamlit-analytics
  - name: streamlit-chat